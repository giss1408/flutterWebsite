<svg width="180" height="50" viewBox="0 0 180 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b5563;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Modern geometric icon -->
  <g filter="url(#shadow)">
    <!-- Outer ring -->
    <circle cx="25" cy="25" r="18" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.6"/>
    
    <!-- Inner elements -->
    <path d="M 15 25 L 25 15 L 35 25 L 25 35 Z" fill="url(#logoGradient)" opacity="0.8"/>
    <circle cx="25" cy="25" r="6" fill="white"/>
    <circle cx="25" cy="25" r="3" fill="url(#logoGradient)"/>
    
    <!-- Modern accent lines -->
    <line x1="8" y1="25" x2="12" y2="25" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="25" x2="42" y2="25" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="25" y1="8" x2="25" y2="12" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="25" y1="38" x2="25" y2="42" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Modern typography -->
  <text x="60" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#textGradient)" letter-spacing="-0.5">
    Regisse
  </text>
  <text x="60" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500" fill="#6b7280" letter-spacing="1" opacity="0.8">
    BUSINESS SOLUTIONS
  </text>
  
  <!-- Subtle accent dot -->
  <circle cx="170" cy="32" r="2" fill="url(#logoGradient)" opacity="0.7"/>
</svg>