<?xml version="1.0" encoding="UTF-8"?>
<svg width="317" height="565" viewBox="0 0 317 565" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Device Frame SVG - Optimized for Performance -->
  
  <!-- Outer frame -->
  <rect x="2" y="2" width="313" height="561" rx="45" ry="45" 
        fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  
  <!-- Screen area -->
  <rect x="25" y="80" width="267" height="425" rx="8" ry="8" 
        fill="#000" stroke="#444" stroke-width="1"/>
  
  <!-- Top speaker/camera area -->
  <rect x="120" y="35" width="77" height="6" rx="3" ry="3" 
        fill="#666"/>
  
  <!-- Camera -->
  <circle cx="140" cy="60" r="8" fill="#333" stroke="#666" stroke-width="1"/>
  <circle cx="140" cy="60" r="5" fill="#000"/>
  
  <!-- Home button -->
  <circle cx="158.5" cy="525" r="20" fill="#333" stroke="#666" stroke-width="2"/>
  <circle cx="158.5" cy="525" r="15" fill="none" stroke="#888" stroke-width="1"/>
  
  <!-- Side buttons -->
  <!-- Volume up -->
  <rect x="0" y="120" width="4" height="35" rx="2" ry="2" fill="#444"/>
  <!-- Volume down -->
  <rect x="0" y="170" width="4" height="35" rx="2" ry="2" fill="#444"/>
  <!-- Power button -->
  <rect x="313" y="140" width="4" height="45" rx="2" ry="2" fill="#444"/>
  
  <!-- Subtle gradient overlay for depth -->
  <defs>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  
  <rect x="2" y="2" width="313" height="561" rx="45" ry="45" 
        fill="url(#frameGradient)" fill-opacity="0.3"/>
</svg>