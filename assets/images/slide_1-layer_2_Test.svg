<?xml version="1.0" encoding="UTF-8"?>
<svg width="596" height="368" viewBox="0 0 596 368" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Slide 1 Layer 2 - Complementary design elements -->
  
  <defs>
    <!-- Gradient definitions -->
    <radialGradient id="centerGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.4"/>
    </radialGradient>
    
    <linearGradient id="edgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Central focal element -->
  <ellipse cx="298" cy="184" rx="120" ry="80" fill="url(#centerGradient)" opacity="0.7"/>
  
  <!-- Surrounding elements -->
  <rect x="50" y="50" width="80" height="80" rx="40" 
        fill="url(#edgeGradient)" opacity="0.5" transform="rotate(20 90 90)"/>
  <rect x="450" y="220" width="100" height="60" rx="30" 
        fill="url(#centerGradient)" opacity="0.6" transform="rotate(-15 500 250)"/>
  
  <!-- Dynamic curves -->
  <path d="M100 200 Q 200 100 400 150 T 550 180" 
        stroke="url(#centerGradient)" stroke-width="4" fill="none" opacity="0.5"/>
  <path d="M50 300 Q 150 250 300 280 T 500 320" 
        stroke="url(#edgeGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Accent shapes -->
  <polygon points="150,300 200,300 175,350" fill="url(#edgeGradient)" opacity="0.4"/>
  <polygon points="400,80 460,80 430,140" fill="url(#centerGradient)" opacity="0.5"/>
  
  <!-- Floating elements -->
  <circle cx="80" cy="150" r="15" fill="url(#centerGradient)" opacity="0.6"/>
  <circle cx="520" cy="100" r="20" fill="url(#edgeGradient)" opacity="0.5"/>
  <circle cx="150" cy="50" r="12" fill="url(#centerGradient)" opacity="0.7"/>
  <circle cx="480" cy="300" r="18" fill="url(#edgeGradient)" opacity="0.4"/>
  
  <!-- Connecting network -->
  <g stroke="url(#centerGradient)" stroke-width="1" opacity="0.3" fill="none">
    <line x1="80" y1="150" x2="150" y2="50"/>
    <line x1="520" y1="100" x2="480" y2="300"/>
    <line x1="298" y1="184" x2="520" y2="100"/>
  </g>
</svg>