<?xml version="1.0" encoding="UTF-8"?>
<svg width="901" height="474" viewBox="0 0 901 474" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Slide 4 Layer 2 - Mobile/Technology themed elements -->
  
  <defs>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.5"/>
    </linearGradient>
    
    <linearGradient id="mobileGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0.4"/>
    </linearGradient>
    
    <radialGradient id="networkGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.3"/>
    </radialGradient>
  </defs>
  
  <!-- Network nodes -->
  <circle cx="150" cy="150" r="20" fill="url(#techGradient)" opacity="0.8"/>
  <circle cx="350" cy="100" r="15" fill="url(#mobileGradient)" opacity="0.7"/>
  <circle cx="600" cy="180" r="25" fill="url(#networkGradient)" opacity="0.6"/>
  <circle cx="450" cy="300" r="18" fill="url(#techGradient)" opacity="0.8"/>
  <circle cx="750" cy="250" r="22" fill="url(#mobileGradient)" opacity="0.7"/>
  <circle cx="200" cy="350" r="16" fill="url(#networkGradient)" opacity="0.6"/>
  
  <!-- Connection lines (network visualization) -->
  <g stroke="url(#techGradient)" stroke-width="2" opacity="0.5" fill="none">
    <line x1="150" y1="150" x2="350" y2="100"/>
    <line x1="350" y1="100" x2="600" y2="180"/>
    <line x1="600" y1="180" x2="750" y2="250"/>
    <line x1="450" y1="300" x2="600" y2="180"/>
    <line x1="200" y1="350" x2="450" y2="300"/>
    <line x1="150" y1="150" x2="200" y2="350"/>
  </g>
  
  <!-- Mobile device shapes -->
  <rect x="100" y="250" width="60" height="120" rx="8" 
        fill="url(#mobileGradient)" opacity="0.5"/>
  <rect x="700" y="350" width="80" height="100" rx="10" 
        fill="url(#techGradient)" opacity="0.6"/>
  
  <!-- Signal waves -->
  <g stroke="url(#networkGradient)" stroke-width="3" fill="none" opacity="0.4">
    <path d="M600 180 Q 650 160 700 180"/>
    <path d="M600 180 Q 650 140 720 160"/>
    <path d="M600 180 Q 650 120 740 140"/>
  </g>
  
  <!-- Data flow visualization -->
  <path d="M50 200 Q 200 100 400 150 Q 600 200 850 250" 
        stroke="url(#mobileGradient)" stroke-width="4" fill="none" opacity="0.6"
        stroke-dasharray="10 5"/>
  
  <!-- Floating UI elements -->
  <rect x="300" y="200" width="100" height="40" rx="20" 
        fill="url(#techGradient)" opacity="0.4"/>
  <rect x="500" y="350" width="120" height="30" rx="15" 
        fill="url(#mobileGradient)" opacity="0.5"/>
  
  <!-- Pulse effects around main nodes -->
  <g opacity="0.3">
    <circle cx="600" cy="180" r="35" stroke="url(#networkGradient)" 
            stroke-width="2" fill="none"/>
    <circle cx="600" cy="180" r="45" stroke="url(#networkGradient)" 
            stroke-width="1" fill="none"/>
  </g>
  
  <!-- Binary code pattern -->
  <g fill="url(#techGradient)" opacity="0.2" font-family="monospace" font-size="12">
    <text x="50" y="400">01001000</text>
    <text x="200" y="420">11010110</text>
    <text x="400" y="440">10110100</text>
    <text x="600" y="460">01101001</text>
    <text x="800" y="450">11001010</text>
  </g>
</svg>