<?xml version="1.0" encoding="UTF-8"?>
<svg width="801" height="429" viewBox="0 0 801 429" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Slide 3 Layer 2 - Business/Finance themed elements -->
  
  <defs>
    <linearGradient id="businessGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:0.5"/>
    </linearGradient>
    
    <linearGradient id="financeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Chart-like elements -->
  <rect x="100" y="250" width="30" height="120" fill="url(#businessGradient)" opacity="0.7"/>
  <rect x="150" y="200" width="30" height="170" fill="url(#financeGradient)" opacity="0.6"/>
  <rect x="200" y="150" width="30" height="220" fill="url(#businessGradient)" opacity="0.8"/>
  <rect x="250" y="180" width="30" height="190" fill="url(#financeGradient)" opacity="0.5"/>
  <rect x="300" y="100" width="30" height="270" fill="url(#businessGradient)" opacity="0.6"/>
  
  <!-- Growth arrows -->
  <path d="M400 300 L 500 200 L 600 180 L 700 120" 
        stroke="url(#businessGradient)" stroke-width="4" fill="none" opacity="0.8"/>
  <polygon points="690,110 710,120 700,140" fill="url(#businessGradient)" opacity="0.8"/>
  
  <!-- Circular progress indicators -->
  <circle cx="600" cy="300" r="40" stroke="url(#financeGradient)" 
          stroke-width="8" fill="none" opacity="0.6"
          stroke-dasharray="150 100" transform="rotate(-90 600 300)"/>
  <circle cx="150" cy="100" r="30" stroke="url(#businessGradient)" 
          stroke-width="6" fill="none" opacity="0.7"
          stroke-dasharray="120 60" transform="rotate(-90 150 100)"/>
  
  <!-- Geometric data points -->
  <circle cx="450" cy="250" r="8" fill="url(#businessGradient)" opacity="0.8"/>
  <circle cx="550" cy="200" r="6" fill="url(#financeGradient)" opacity="0.7"/>
  <circle cx="650" cy="150" r="10" fill="url(#businessGradient)" opacity="0.6"/>
  
  <!-- Connection lines -->
  <path d="M450 250 Q 500 200 550 200 Q 600 175 650 150" 
        stroke="url(#financeGradient)" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Background grid pattern -->
  <g stroke="url(#businessGradient)" stroke-width="1" opacity="0.2" fill="none">
    <line x1="50" y1="100" x2="750" y2="100"/>
    <line x1="50" y1="200" x2="750" y2="200"/>
    <line x1="50" y1="300" x2="750" y2="300"/>
    <line x1="100" y1="50" x2="100" y2="400"/>
    <line x1="300" y1="50" x2="300" y2="400"/>
    <line x1="500" y1="50" x2="500" y2="400"/>
    <line x1="700" y1="50" x2="700" y2="400"/>
  </g>
</svg>