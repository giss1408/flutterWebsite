<?xml version="1.0" encoding="UTF-8"?>
<svg width="760" height="480" viewBox="0 0 760 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Slide 1 Layer 1 - Abstract geometric design -->
  
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.6"/>
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0.5"/>
    </linearGradient>
    
    <!-- Filter for glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background shapes -->
  <circle cx="150" cy="120" r="80" fill="url(#primaryGradient)" opacity="0.6"/>
  <circle cx="550" cy="200" r="100" fill="url(#accentGradient)" opacity="0.5"/>
  <circle cx="400" cy="350" r="60" fill="url(#primaryGradient)" opacity="0.7"/>
  
  <!-- Geometric shapes -->
  <polygon points="200,50 280,50 240,130" fill="url(#accentGradient)" opacity="0.6"/>
  <polygon points="500,300 600,300 550,400 450,400" fill="url(#primaryGradient)" opacity="0.5"/>
  
  <!-- Connecting lines -->
  <path d="M150 120 Q 300 200 550 200" stroke="url(#primaryGradient)" 
        stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M400 350 Q 500 250 600 300" stroke="url(#accentGradient)" 
        stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Decorative elements -->
  <rect x="50" y="300" width="100" height="20" rx="10" 
        fill="url(#primaryGradient)" opacity="0.4" transform="rotate(15 100 310)"/>
  <rect x="600" y="100" width="80" height="15" rx="7" 
        fill="url(#accentGradient)" opacity="0.6" transform="rotate(-20 640 107)"/>
  
  <!-- Subtle dots pattern -->
  <g opacity="0.3">
    <circle cx="100" cy="200" r="3" fill="url(#primaryGradient)"/>
    <circle cx="300" cy="100" r="2" fill="url(#accentGradient)"/>
    <circle cx="650" cy="250" r="4" fill="url(#primaryGradient)"/>
    <circle cx="450" cy="450" r="2" fill="url(#accentGradient)"/>
  </g>
</svg>