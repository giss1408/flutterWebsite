server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Flutter SPA: unknown paths fall back to index.html so the Dart router
    # handles them instead of nginx returning a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for content-hashed static assets produced by the
    # Flutter build tool (main.dart.js, canvaskit binaries, fonts, images…).
    location ~* \.(js|css|wasm|png|svg|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for the service-worker manifest so updates are picked up
    # immediately without a hard reload.
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache";
    }

    # Standard security headers.
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/wasm
                    image/svg+xml font/woff font/woff2;
    gzip_min_length 1024;
}
