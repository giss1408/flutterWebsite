  <!-- Page Title -->
  <title>Regisse__ #Business Solutions — SaaS, Design & Développement Sur Mesure</title>

  <!-- Dark Mode Support -->
  <script>
    // Detect system dark mode preference and apply early to prevent flash
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    
    // Listen for theme changes
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
      });
    }
  </script>

  <!-- Performance Optimizations -->
  <style>
    /* Critical CSS - Prevent layout shift */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      scroll-behavior: smooth;
      background-color: #F9FAFB;
      color: #1E293B;
    }
    
    html[data-theme="dark"] {
      background-color: #0F172A;
      color: #F1F5F9;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Loading placeholder */
    #app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .flutter-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      background: linear-gradient(135deg, #F9FAFB 0%, #EFF8FF 100%);
    }
    
    .flutter-loading {
      text-align: center;
      font-size: 18px;
      color: #64748B;
      font-weight: 500;
    }
    
    /* Smooth transitions */
    @media (prefers-reduced-motion: no-preference) {
      html {
        scroll-behavior: smooth;
      }
    }
  </style>

  </script>
